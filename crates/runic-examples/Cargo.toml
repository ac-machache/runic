path = "examples/minimal.rs"

[[example]]
name = "with_tools"
path = "examples/with_tools.rs"

[[example]]
name = "with_hooks"
path = "examples/with_hooks.rs"

[[example]]
name = "custom_reminder"
path = "examples/custom_reminder.rs"

[[example]]
name = "with_mcp"
